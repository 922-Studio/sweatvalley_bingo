name: Deploy Sweatvalley Bingo

permissions:
  contents: write
  actions: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  cancel-previous-runs:
    uses: 922-Studio/workflows/.github/workflows/cancel-previous-runs.yml@main

  # ────────────────────────────────────────────────────────────────────────────
  version:
    name: Create new version
    needs: cancel-previous-runs
    uses: 922-Studio/workflows/.github/workflows/versioning.yml@main
    with:
      use_ai: false
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  # ────────────────────────────────────────────────────────────────────────────
  server-tests:
    name: Server tests (Vitest + Allure)
    needs: version
    uses: 922-Studio/workflows/.github/workflows/frontend-tests.yml@main
    with:
      node_version: '20.x'
      working_directory: 'server'
      install_command: 'npm ci'
      test_command: 'npx vitest run'
      run_build: false
      allure_results_dir: 'reports/allure'
      allure_server_url: 'http://home-lab:5050'
      allure_project_id: 'sweatvalley-bingo-server'
      allure_launch_name: 'Sweatvalley Bingo Server Tests'
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  # ────────────────────────────────────────────────────────────────────────────
  client-tests:
    name: Client tests (Jest + Allure)
    needs: version
    runs-on: self-hosted
    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          repository: 922-Studio/workflows
          ref: main
          path: workflow-scripts
          token: ${{ secrets.PAT_GITHUB }}

      - name: Checkout application code
        uses: actions/checkout@v4
        with:
          path: app-code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: app-code/client
        run: npm install

      - name: Run client tests
        working-directory: app-code/client
        env:
          CI: true
          ALLURE_RESULTS_DIR: reports/allure
        run: |
          mkdir -p reports/allure
          npx react-scripts test --watchAll=false --testEnvironment=allure-jest/jsdom

      - name: Upload Allure results
        if: always()
        env:
          ALLURE_RESULTS_DIR: app-code/client/reports/allure
          ALLURE_SERVER_URL: http://home-lab:5050
          ALLURE_PROJECT_ID: sweatvalley-bingo-client
          ALLURE_LAUNCH_NAME: Sweatvalley Bingo Client Tests
        run: python3 workflow-scripts/.github/scripts/upload_allure_results.py

  # ────────────────────────────────────────────────────────────────────────────
  smoke:
    name: Pre-deploy smoke test
    needs: [server-tests, client-tests]
    uses: 922-Studio/workflows/.github/workflows/smoke-test.yml@main
    with:
      repository_path: '/home/lab/sweatvalley_bingo'
      docker_compose_file: 'docker-compose.yml'
      expected_services: 'bingo'
      healthcheck_endpoints: '{"bingo":"3001:/health"}'
      pull_code: true
      max_retries: 24
      retry_delay_seconds: 5
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Docker service
    needs: smoke
    uses: 922-Studio/workflows/.github/workflows/deploy-docker.yml@main
    with:
      repository_path: '/home/lab/sweatvalley_bingo'
      docker_compose_file: 'docker-compose.yml'
      service_name: 'bingo'
      boot_script: 'deploy.sh'
      pull_code: false
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  # ────────────────────────────────────────────────────────────────────────────
  notify-success:
    needs: [version, smoke, deploy]
    if: success()
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      workflow_status: 'success'
      workflow_name: '${{ github.workflow }}'
      repository_name: '${{ github.repository }}'
      run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  notify-failure:
    needs: [version, server-tests, client-tests, smoke, deploy]
    if: failure()
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      workflow_status: 'failure'
      workflow_name: '${{ github.workflow }}'
      repository_name: '${{ github.repository }}'
      run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
