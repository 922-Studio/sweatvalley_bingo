services:
  bingo:
    build: .
    container_name: sweatvalley-bingo
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bingo.rule=Host(`sweatvalley-bingo.922-studio.com`)"
      - "traefik.http.routers.bingo.entrypoints=web"
      - "traefik.http.services.bingo.loadbalancer.server.port=3001"

networks:
  proxy:
    external: true
